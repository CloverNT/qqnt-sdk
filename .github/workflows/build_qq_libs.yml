name: Build QQ NT libs

# Manual: QQ geo-gates version discovery and its download URLs carry an
# unguessable per-build hash, so CI can't auto-find the latest - paste an
# official QQ download link (https://im.qq.com) for each platform/arch you
# want built. `detect-version` reads the real version out of one of them, so
# nobody types a version number; it becomes the release tag `qq-<version>`.

on:
  workflow_dispatch:
    inputs:
      win_x64_url:
        description: 'Official QQ Windows x64 installer link. Blank = skip.'
        default: ''
      win_arm64_url:
        description: 'Official QQ Windows arm64 installer link. Blank = skip.'
        default: ''
      linux_x64_url:
        description: 'Official QQ Linux x64 (amd64) .deb link. Blank = skip.'
        default: ''
      linux_arm64_url:
        description: 'Official QQ Linux arm64 .deb link. Blank = skip.'
        default: ''
      force:
        description: 'Rebuild & re-upload even if the release already has the assets'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: qq-libs-build
  cancel-in-progress: false

jobs:
  # Downloads one of the provided links and reads the real version out of it.
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.dv.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install extractor (7z reads the Windows installer)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full >/dev/null
      - name: Download a sample package
        run: |
          mkdir -p sample
          if [ -n "${{ inputs.win_x64_url }}" ]; then
            url="${{ inputs.win_x64_url }}"; ext=exe; platform=windows
          elif [ -n "${{ inputs.win_arm64_url }}" ]; then
            url="${{ inputs.win_arm64_url }}"; ext=exe; platform=windows
          elif [ -n "${{ inputs.linux_x64_url }}" ]; then
            url="${{ inputs.linux_x64_url }}"; ext=deb; platform=linux
          elif [ -n "${{ inputs.linux_arm64_url }}" ]; then
            url="${{ inputs.linux_arm64_url }}"; ext=deb; platform=linux
          else
            echo "::error::provide at least one of win_x64_url, win_arm64_url, linux_x64_url, linux_arm64_url" >&2; exit 1
          fi
          echo "==> $url"
          curl -fL --retry 3 --connect-timeout 30 -o "sample/pkg.$ext" "$url"
          echo "PLATFORM=$platform" >> "$GITHUB_ENV"
          echo "PKG=sample/pkg.$ext" >> "$GITHUB_ENV"
      - id: dv
        run: bash scripts/detect_version.sh "$PKG" "$PLATFORM"

  resolve:
    needs: detect-version
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.r.outputs.skip }}
      tag: ${{ steps.r.outputs.tag }}
      version: ${{ steps.r.outputs.version }}
      win_matrix: ${{ steps.r.outputs.win_matrix }}
      linux_matrix: ${{ steps.r.outputs.linux_matrix }}
      existing: ${{ steps.r.outputs.existing }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - id: r
        run: node scripts/resolve.mjs
        env:
          VERSION: ${{ needs.detect-version.outputs.version }}
          WIN_X64_URL: ${{ inputs.win_x64_url }}
          WIN_ARM64_URL: ${{ inputs.win_arm64_url }}
          LINUX_X64_URL: ${{ inputs.linux_x64_url }}
          LINUX_ARM64_URL: ${{ inputs.linux_arm64_url }}
          FORCE: ${{ inputs.force }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Summary
        run: |
          {
            echo "### QQ libs · ${{ steps.r.outputs.version }}"
            echo "- release tag: \`${{ steps.r.outputs.tag }}\`"
            echo "- windows: ${{ steps.r.outputs.win_matrix }}"
            echo "- linux: ${{ steps.r.outputs.linux_matrix }}"
            echo "- already on release: ${{ steps.r.outputs.existing }}"
            echo "- skip: ${{ steps.r.outputs.skip }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Ensure the release exists once, so the matrix build jobs can upload to it.
  prepare-release:
    needs: resolve
    if: needs.resolve.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.resolve.outputs.tag }}"
          if gh release view "$tag" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $tag already exists"
          else
            gh release create "$tag" -R "$GITHUB_REPOSITORY" \
              --title "QQNT SDK · ${{ needs.resolve.outputs.version }}" \
              --notes "Import libs / linkable objects + matching Node/Electron headers (include as <QQNT/node.h>) for QQ ${{ needs.resolve.outputs.version }}. node/electron/v8 versions are in each package's manifest.txt."
          fi

  # -------------------------------------------------------------------------
  build-windows:
    needs: [resolve, prepare-release]
    if: needs.resolve.outputs.skip != 'true' && needs.resolve.outputs.win_matrix != '[]'
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve.outputs.win_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Download installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer | Out-Null
          Write-Host "==> ${{ matrix.url }}"
          curl.exe -fL --retry 3 --connect-timeout 30 -o installer/QQ-setup.exe "${{ matrix.url }}"
          if ($LASTEXITCODE -ne 0 -or (Get-Item installer/QQ-setup.exe).Length -lt 10485760) { throw "download failed" }

      - name: Generate MSVC import libraries (pe -> .def -> lib.exe)
        shell: bash
        run: |
          bash scripts/gen_import_libs.sh \
            installer/QQ-setup.exe out "${{ matrix.arch }}" "QQ.exe,QQNT.dll,wrapper.node"

      - name: Package & upload to release
        shell: pwsh
        run: |
          $folder = (Get-ChildItem out -Directory | Select-Object -First 1).Name
          if (-not $folder) { throw "no output folder produced" }
          Compress-Archive -Path "out/$folder" -DestinationPath "$folder.zip" -Force
          Write-Host "uploading $folder.zip"
          gh release upload "${{ needs.resolve.outputs.tag }}" "$folder.zip" -R $env:GITHUB_REPOSITORY --clobber

  # -------------------------------------------------------------------------
  build-linux:
    needs: [resolve, prepare-release]
    if: needs.resolve.outputs.skip != 'true' && needs.resolve.outputs.linux_matrix != '[]'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve.outputs.linux_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Download package
        run: |
          mkdir -p pkg
          echo "==> ${{ matrix.url }}"
          curl -fL --retry 3 --connect-timeout 30 -o pkg/qq.deb "${{ matrix.url }}"

      - name: Extract & copy linkable objects
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq file >/dev/null
          bash scripts/extract_linux.sh pkg/qq.deb out "${{ matrix.arch }}"

      - name: Package & upload to release
        run: |
          folder="$(ls -1 out | head -n1)"
          [ -z "$folder" ] && { echo "::error::no output folder produced"; exit 1; }
          ( cd out && zip -qr "../$folder.zip" "$folder" )
          echo "uploading $folder.zip"
          gh release upload "${{ needs.resolve.outputs.tag }}" "$folder.zip" -R "$GITHUB_REPOSITORY" --clobber
