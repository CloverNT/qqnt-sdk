name: Build QQ NT libs

# MANUAL build. QQ geo-gates its download config (only China IPs get the latest;
# overseas CI gets stale, pruned links) and the URLs carry an unguessable
# per-build hash — so a US runner can't auto-discover the latest. You drive each
# build: give the version and paste an official QQ download link (copied from
# https://im.qq.com). Both arches are derived from one link per platform. The
# four packages are published to a GitHub Release tagged `qq-<version>`.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'QQ version this build is for, e.g. 9.9.31-49738 (tag + what CMake requests)'
        required: true
      win_url:
        description: 'Official QQ Windows installer link (any arch; x64+arm64 derived). Blank = skip Windows.'
        default: ''
      linux_url:
        description: 'Official QQ Linux .deb link (any arch; amd64+arm64 derived). Blank = skip Linux.'
        default: ''
      force:
        description: 'Rebuild & re-upload even if the release already has the assets'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: qq-libs-build
  cancel-in-progress: false

jobs:
  # -------------------------------------------------------------------------
  resolve:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.r.outputs.skip }}
      tag: ${{ steps.r.outputs.tag }}
      version: ${{ steps.r.outputs.version }}
      win_matrix: ${{ steps.r.outputs.win_matrix }}
      linux_matrix: ${{ steps.r.outputs.linux_matrix }}
      existing: ${{ steps.r.outputs.existing }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - id: r
        run: node scripts/resolve.mjs
        env:
          VERSION: ${{ inputs.version }}
          WIN_URL: ${{ inputs.win_url }}
          LINUX_URL: ${{ inputs.linux_url }}
          FORCE: ${{ inputs.force }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Summary
        run: |
          {
            echo "### QQ libs · ${{ steps.r.outputs.version }}"
            echo "- release tag: \`${{ steps.r.outputs.tag }}\`"
            echo "- windows: ${{ steps.r.outputs.win_matrix }}"
            echo "- linux: ${{ steps.r.outputs.linux_matrix }}"
            echo "- already on release: ${{ steps.r.outputs.existing }}"
            echo "- skip: ${{ steps.r.outputs.skip }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Ensure the release exists once, so the parallel build jobs can upload to it
  # without racing on release creation.
  prepare-release:
    needs: resolve
    if: needs.resolve.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.resolve.outputs.tag }}"
          if gh release view "$tag" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $tag already exists"
          else
            gh release create "$tag" -R "$GITHUB_REPOSITORY" \
              --title "QQNT SDK · ${{ needs.resolve.outputs.version }}" \
              --notes "Import libs / linkable objects + matching Node/Electron headers (include as <QQNT/node.h>) for QQ ${{ needs.resolve.outputs.version }}. node/electron/v8 versions are in each package's manifest.txt."
          fi

  # -------------------------------------------------------------------------
  build-windows:
    needs: [resolve, prepare-release]
    if: needs.resolve.outputs.skip != 'true' && needs.resolve.outputs.win_matrix != '[]'
    runs-on: windows-latest
    env:
      # llvm-mingw: one toolchain for x64 + arm64 (gendef, llvm-dlltool, llvm-ar).
      LLVM_MINGW_TAG: '20260602'
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve.outputs.win_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache llvm-mingw
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: C:\llvm-mingw-${{ env.LLVM_MINGW_TAG }}-ucrt-x86_64
          key: llvm-mingw-${{ env.LLVM_MINGW_TAG }}-ucrt-x86_64

      - name: Setup llvm-mingw
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $tag = "${{ env.LLVM_MINGW_TAG }}"
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/$tag/llvm-mingw-$tag-ucrt-x86_64.zip"
          Write-Host "==> $url"
          curl.exe -fL --retry 3 -o "$env:RUNNER_TEMP\llvm.zip" $url
          if ($LASTEXITCODE -ne 0) { throw "llvm-mingw download failed" }
          Expand-Archive "$env:RUNNER_TEMP\llvm.zip" -DestinationPath "C:\" -Force

      - name: Add llvm-mingw to PATH
        shell: pwsh
        run: |
          "C:\llvm-mingw-${{ env.LLVM_MINGW_TAG }}-ucrt-x86_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding ascii

      - name: Download installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer | Out-Null
          Write-Host "==> ${{ matrix.url }}"
          curl.exe -fL --retry 3 --connect-timeout 30 -o installer/QQ-setup.exe "${{ matrix.url }}"
          if ($LASTEXITCODE -ne 0 -or (Get-Item installer/QQ-setup.exe).Length -lt 10485760) { throw "download failed" }

      - name: Generate import libraries (gendef + llvm-dlltool)
        shell: bash
        run: |
          bash scripts/gen_import_libs.sh \
            installer/QQ-setup.exe out "${{ matrix.arch }}" "QQ.exe,QQNT.dll,wrapper.node"

      - name: Package & upload to release
        shell: pwsh
        run: |
          $folder = (Get-ChildItem out -Directory | Select-Object -First 1).Name
          if (-not $folder) { throw "no output folder produced" }
          Compress-Archive -Path "out/$folder" -DestinationPath "$folder.zip" -Force
          Write-Host "uploading $folder.zip"
          gh release upload "${{ needs.resolve.outputs.tag }}" "$folder.zip" -R $env:GITHUB_REPOSITORY --clobber

  # -------------------------------------------------------------------------
  build-linux:
    needs: [resolve, prepare-release]
    if: needs.resolve.outputs.skip != 'true' && needs.resolve.outputs.linux_matrix != '[]'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve.outputs.linux_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Download package
        run: |
          mkdir -p pkg
          echo "==> ${{ matrix.url }}"
          curl -fL --retry 3 --connect-timeout 30 -o pkg/qq.deb "${{ matrix.url }}"

      - name: Extract & copy linkable objects
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq file >/dev/null
          bash scripts/extract_linux.sh pkg/qq.deb out "${{ matrix.arch }}"

      - name: Package & upload to release
        run: |
          folder="$(ls -1 out | head -n1)"
          [ -z "$folder" ] && { echo "::error::no output folder produced"; exit 1; }
          ( cd out && zip -qr "../$folder.zip" "$folder" )
          echo "uploading $folder.zip"
          gh release upload "${{ needs.resolve.outputs.tag }}" "$folder.zip" -R "$GITHUB_REPOSITORY" --clobber
